<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Caveat:wght@500;600;700&display=swap');

:root{
  --cream: #f1e9d2;
  --cream-dark: #e9dfc0;
  --gold: #b8963e;
  --gold-bright: #c9a227;
  --navy: #1b3a5c;
  --ink: #2c2a20;
  --olive: #4a4a2a;
  color-scheme: light only;
}

*{ box-sizing: border-box; }

html{ scroll-behavior: smooth; background: var(--cream) !important; height: 100%; overflow-x: hidden; }

body{
  margin: 0;
  min-height: 100vh;
  background: var(--cream) !important;
  color: var(--ink) !important;
  font-family: 'EB Garamond', serif;
  font-size: 19px;
  line-height: 1.6;
}

/* Home page: exact-fit hero, no page scroll */
html:has(body.home-page){
  overflow: hidden;
  height: 100%;
}
body.home-page{
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
body.home-page .site-nav{
  flex-shrink: 0;
}
body.home-page .hero-frame{
  flex: 1;
  min-height: 0;
  max-height: none;
  aspect-ratio: unset;
}

a{ color: var(--navy); text-decoration: none; }
a:hover{ text-decoration: underline; }

img{ max-width: 100%; display: block; }

/* ---------- NAV ---------- */
.site-nav{
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  padding: 0.6rem 2rem;
  background: var(--ink) !important;
  border-bottom: 2px solid var(--gold);
  flex-wrap: wrap;
}
.site-nav .brand{
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.site-nav .brand img{
  height: 48px;
  width: auto;
}
.site-nav .brand span{
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  color: var(--cream);
  font-size: 1.15rem;
  letter-spacing: 0.02em;
}
.site-nav ul{
  list-style: none;
  display: flex;
  gap: 1.8rem;
  margin: 0;
  padding: 0;
  flex-wrap: wrap;
}
.site-nav a{
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  color: var(--gold-bright);
  font-size: 1rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.site-nav a:hover, .site-nav a.active{
  color: var(--cream);
  text-decoration: none;
  border-bottom: 2px solid var(--gold-bright);
}

/* ---------- FOOTER ---------- */
.site-footer{
  text-align: center;
  padding: 2.5rem 1.5rem 3rem;
}
.site-footer .tagline{
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 1.3rem;
  color: var(--ink);
  margin-bottom: 0.4rem;
}
.site-footer .tagline .handle{
  color: var(--gold-bright);
  font-style: normal;
}
.site-footer .copyright{
  font-family: 'EB Garamond', serif;
  color: var(--navy);
  font-size: 0.85rem;
  letter-spacing: 0.02em;
}

/* ---------- HERO (index) ---------- */

/* ---------- GENERIC CONTENT SECTIONS ---------- */
.content{
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 1rem;
  position: relative;
}
.content.with-left-deco{
  padding-left: 4.5rem;
}
.deco-leftlines{
  position: absolute;
  left: -10px;
  top: 0;
  width: 90px;
  height: auto;
  opacity: 0.9;
  pointer-events: none;
}
.deco-hibiscus{
  width: 260px;
  opacity: 0.9;
  pointer-events: none;
}
.bottom-deco-row{
  display: flex;
  align-items: flex-end;
  margin-top: 2rem;
}
.deco-trapezoid{
  width: 340px;
  margin-left: -20px;
  margin-bottom: 8px;
  opacity: 0.9;
  pointer-events: none;
}

h1.page-title{
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
  font-size: 2.6rem;
  margin-bottom: 0.2rem;
}
p.subtitle{
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--gold-bright);
  font-size: 1.2rem;
  margin: 0.2rem 0;
}
p.welcome{
  text-align: center;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--ink);
  font-size: 1.15rem;
  margin: 0.2rem 0 2rem;
}

h2.section-head{
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 1.5rem;
  margin: 2.2rem 0 0.6rem;
}
h2.section-head.big{
  text-align: center;
  font-size: 1.9rem;
}
.section-head .accent{
  color: var(--gold-bright);
  text-transform: uppercase;
}

.lede{
  font-weight: 500;
  font-size: 1.15rem;
}

ul.plain{
  padding-left: 1.4rem;
}
ul.plain li{ margin-bottom: 0.4rem; }

.center{ text-align: center; }

.cta-link{
  display: inline-block;
  margin-top: 0.6rem;
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  color: var(--navy);
  border-bottom: 1px solid var(--navy);
}

/* ---------- STORY PAGE ---------- */
.story-wrap{
  max-width: 950px;
  margin: 1rem auto 2rem;
  padding: 0;
  border-left: 3px solid var(--gold);
  border-right: 3px solid var(--gold);
  background: var(--cream);
}
.story-flourish{
  display: block;
  width: 100%;
  height: auto;
}
.story-inner{
  padding: 1rem 3rem 2rem;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  color: var(--olive);
  font-size: 1.05rem;
  line-height: 1.55;
}
.story-inner p{ margin: 0 0 1rem; }
.owner-photo{
  width: 160px;
  border-radius: 4px;
  float: right;
  margin: 0.3rem 0 1rem 1.2rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

/* ---------- MENU PAGE ---------- */
.menu-wrap{
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 2rem 1rem;
  font-family: 'Caveat', cursive;
  color: var(--olive);
  position: relative;
}
.menu-grid{
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem;
  align-items: start;
}
.menu-photos-col img{
  border: 3px dashed var(--gold-bright);
  border-radius: 6px;
  margin-bottom: 1.5rem;
  transform: rotate(-3deg);
}
.menu-photos-col.right img{ transform: rotate(3deg); }
.menu-center{
  text-align: center;
}
.menu-center h2{
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 2.4rem;
  color: var(--ink);
  margin: 1.2rem 0 0.6rem;
}
.menu-center p{
  font-size: 1.35rem;
  margin: 0.15rem 0;
  line-height: 1.35;
}
.menu-center .item-name{
  font-weight: 700;
  color: var(--gold);
}
@media (max-width: 900px){
  .menu-grid{ grid-template-columns: 1fr; }
  .menu-photos-col img{ transform: none; max-width: 260px; margin: 0 auto 1.5rem; }
}

/* ---------- FIND US PAGE ---------- */
.find-us-wrap{
  max-width: 900px;
  margin: 0 auto;
  padding: 2.5rem 2rem 1rem;
  text-align: center;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 700px){
  .site-nav{ padding: 0.5rem 1rem; }
  .site-nav ul{ gap: 1rem; justify-content: center; }
  .content{ padding: 2rem 1.2rem 1rem; }
  .content.with-left-deco{ padding-left: 1.2rem; }
  .deco-leftlines{ display: none; }
  h1.page-title{ font-size: 2rem; }
  .story-inner{ padding: 1rem 1.4rem 1.5rem; font-size: 1rem; }
  .owner-photo{ width: 110px; }
}

</style>
</head>
